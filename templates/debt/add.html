{% extends "base.html" %}

{% block title %}নতুন লেনদেন রেকর্ড{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header">
                    <h4>নতুন লেনদেন রেকর্ড যোগ করুন</h4>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="form-group">
                            <label for="name">নাম *</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>

                        <div class="form-group">
                            <label for="phone">ফোন নম্বর *</label>
                            <input type="text" class="form-control" id="phone" name="phone" required>
                        </div>

                        <div class="form-group">
                            <label for="address">ঠিকানা</label>
                            <textarea class="form-control" id="address" name="address" rows="2"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="amount">টাকার পরিমাণ *</label>
                            <input type="number" step="0.01" class="form-control" id="amount" name="amount" required>
                        </div>

                        <div class="form-group">
                            <label for="due_date">কবে দিবে (তারিখ) *</label>
                            <input type="date" class="form-control" id="due_date" name="due_date" required>
                        </div>

                        <div class="form-group">
                            <label for="photo">ছবি</label>
                            <input type="file" class="form-control-file" id="photo" name="photo" accept="image/*">
                            <small class="form-text text-muted">JPG, PNG, GIF (Max 5MB)</small>
                        </div>

                        <div class="form-group">
                            <label for="notes">নোট</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                        </div>

                        <div class="form-group">
                            <button type="submit" class="btn btn-primary">সেভ করুন</button>
                            <a href="{{ url_for('debt.index') }}" class="btn btn-secondary">বাতিল</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
