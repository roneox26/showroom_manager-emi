{% extends "base.html" %}

{% block title %}রেকর্ড এডিট করুন{% endblock %}

{% block content %}
<div class="container mt-4 debt-page">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card debt-panel debt-fade-in">
                <div class="card-header py-3">
                    <h4 class="mb-0"><i class="bi bi-pencil-square me-2"></i>রেকর্ড এডিট করুন</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data" class="row g-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label">নাম *</label>
                            <input type="text" class="form-control form-control-lg" id="name" name="name" value="{{ record.name }}" required>
                        </div>

                        <div class="col-md-6">
                            <label for="phone" class="form-label">ফোন নম্বর *</label>
                            <input type="text" class="form-control form-control-lg" id="phone" name="phone" value="{{ record.phone }}" required>
                        </div>

                        <div class="col-12">
                            <label for="address" class="form-label">ঠিকানা</label>
                            <textarea class="form-control" id="address" name="address" rows="2">{{ record.address }}</textarea>
                        </div>

                        <div class="col-md-6">
                            <label for="amount" class="form-label">টাকার পরিমাণ *</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text">৳</span>
                                <input type="number" step="0.01" class="form-control" id="amount" name="amount" value="{{ record.amount }}" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label for="due_date" class="form-label">কবে দিবে (তারিখ) *</label>
                            <input type="date" class="form-control form-control-lg" id="due_date" name="due_date" value="{{ record.due_date.strftime('%Y-%m-%d') }}" required>
                        </div>

                        <div class="col-12">
                            <label for="photo" class="form-label">ছবি</label>
                            {% if record.photo %}
                                <div class="mb-3">
                                    <img src="{{ url_for('static', filename='uploads/debt_photos/' + record.photo) }}" alt="{{ record.name }}" class="img-fluid rounded-4" style="max-width: 220px;">
                                </div>
                            {% endif %}
                            <input type="file" class="form-control" id="photo" name="photo" accept="image/*">
                            <small class="form-text">নতুন ছবি আপলোড করতে চাইলে সিলেক্ট করুন</small>
                        </div>

                        <div class="col-12">
                            <label for="notes" class="form-label">নোট</label>
                            <textarea class="form-control" id="notes" name="notes" rows="4">{{ record.notes }}</textarea>
                        </div>

                        <div class="col-12 d-flex flex-wrap gap-2 justify-content-end">
                            <a href="{{ url_for('debt.index') }}" class="btn btn-outline-secondary btn-lg">
                                <i class="bi bi-x-circle me-1"></i>বাতিল
                            </a>
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-arrow-repeat me-1"></i>আপডেট করুন
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
