{% extends "base.html" %}

{% block title %}রেকর্ড এডিট করুন{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header">
                    <h4>রেকর্ড এডিট করুন</h4>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="form-group">
                            <label for="name">নাম *</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ record.name }}" required>
                        </div>

                        <div class="form-group">
                            <label for="phone">ফোন নম্বর *</label>
                            <input type="text" class="form-control" id="phone" name="phone" value="{{ record.phone }}" required>
                        </div>

                        <div class="form-group">
                            <label for="address">ঠিকানা</label>
                            <textarea class="form-control" id="address" name="address" rows="2">{{ record.address }}</textarea>
                        </div>

                        <div class="form-group">
                            <label for="amount">টাকার পরিমাণ *</label>
                            <input type="number" step="0.01" class="form-control" id="amount" name="amount" value="{{ record.amount }}" required>
                        </div>

                        <div class="form-group">
                            <label for="due_date">কবে দিবে (তারিখ) *</label>
                            <input type="date" class="form-control" id="due_date" name="due_date" value="{{ record.due_date.strftime('%Y-%m-%d') }}" required>
                        </div>

                        <div class="form-group">
                            <label for="photo">ছবি</label>
                            {% if record.photo %}
                                <div class="mb-2">
                                    <img src="{{ url_for('static', filename='uploads/debt_photos/' + record.photo) }}" 
                                         alt="{{ record.name }}" 
                                         style="max-width: 200px; border-radius: 5px;">
                                </div>
                            {% endif %}
                            <input type="file" class="form-control-file" id="photo" name="photo" accept="image/*">
                            <small class="form-text text-muted">নতুন ছবি আপলোড করতে চাইলে সিলেক্ট করুন</small>
                        </div>

                        <div class="form-group">
                            <label for="notes">নোট</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3">{{ record.notes }}</textarea>
                        </div>

                        <div class="form-group">
                            <button type="submit" class="btn btn-primary">আপডেট করুন</button>
                            <a href="{{ url_for('debt.index') }}" class="btn btn-secondary">বাতিল</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
